<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercato Nova - Votre Marketplace Nautique</title>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #004a7c;
            --secondary-blue: #0074b7;
            --bg-light: #f0f2f5;
            --white: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --card-bg: #e9ecef;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
        }

        /* --- Header --- */
        .app-header {
            background-color: var(--white);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background-color: #ced4da;
            border-radius: 4px;
        }

        .app-logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 40px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--white);
            font-size: 0.9rem;
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background-color: #e9ecef;
            color: var(--primary-blue);
        }

        /* --- Hero Banner --- */
        .hero-banner {
            margin: 30px 5%;
            background-color: #ced4da;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .hero-icon {
            font-size: 3rem;
            color: var(--accent-orange);
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #2c3e50;
            margin: 0;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: #546e7a;
            margin: 0;
        }

        /* --- Main Content --- */
        .container {
            padding: 20px 5%;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        /* --- Categories --- */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .category-card {
            background-color: var(--card-bg);
            height: 120px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px);
            background-color: #dee2e6;
            color: var(--primary-blue);
        }

        /* --- Auctions --- */
        .auctions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .auction-card {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: box-shadow 0.3s;
        }

        .auction-card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .item-img-placeholder {
            height: 180px;
            background-color: #ced4da;
        }

        .item-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .line-placeholder {
            height: 10px;
            background-color: #dee2e6;
            border-radius: 5px;
            width: 80%;
        }

        .line-placeholder.short {
            width: 40%;
        }

        .hammer-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #adb5bd;
            font-size: 0.9rem;
        }

        /* --- Footer --- */
        .app-footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 992px) {
            .categories-grid { grid-template-columns: repeat(2, 1fr); }
            .auctions-grid { grid-template-columns: repeat(2, 1fr); }
            .search-container { display: none; }
        }

        @media (max-width: 600px) {
            .categories-grid { grid-template-columns: 1fr; }
            .auctions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <div class="logo-box"></div>
            <div class="app-logo-text">Mercato Nova</div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Rechercher du matériel nautique...">
        </div>
        <div class="header-right">
            <div class="icon-btn"><i class="fa-regular fa-bell"></i></div>
            <div class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="icon-btn"><i class="fa-regular fa-user"></i></div>
        </div>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-icon">⛵</div>
            <h1 class="hero-title">Votre Marketplace Nautique</h1>
            <p class="hero-subtitle">Achetez, vendez, enchérissez</p>
        </section>

        <div class="container">
            <h2 class="section-title">Catégories principales</h2>
            <div class="categories-grid">
                <div class="category-card">Voile traditionnelle</div>
                <div class="category-card">Planche à voile</div>
                <div class="category-card">Kitesurf</div>
                <div class="category-card">Accessoires</div>
                <div class="category-card">Vêtements</div>
                <div class="category-card">Pièces détachées</div>
            </div>

            <h2 class="section-title">Enchères se terminant bientôt</h2>
            <div class="auctions-grid">
                <!-- Auction Card 1 -->
                <div class="auction-card">
                    <div class="item-img-placeholder"></div>
                    <div class="item-info">
                        <div class="line-placeholder"></div>
                        <div class="line-placeholder short"></div>
                        <i class="fa-solid fa-gavel hammer-icon"></i>
                    </div>
                </div>
                <!-- Auction Card 2 -->
                <div class="auction-card">
                    <div class="item-img-placeholder"></div>
                    <div class="item-info">
                        <div class="line-placeholder"></div>
                        <div class="line-placeholder short"></div>
                        <i class="fa-solid fa-gavel hammer-icon"></i>
                    </div>
                </div>
                <!-- Auction Card 3 -->
                <div class="auction-card">
                    <div class="item-img-placeholder"></div>
                    <div class="item-info">
                        <div class="line-placeholder"></div>
                        <div class="line-placeholder short"></div>
                        <i class="fa-solid fa-gavel hammer-icon"></i>
                    </div>
                </div>
                <!-- Auction Card 4 -->
                <div class="auction-card">
                    <div class="item-img-placeholder"></div>
                    <div class="item-info">
                        <div class="line-placeholder"></div>
                        <div class="line-placeholder short"></div>
                        <i class="fa-solid fa-gavel hammer-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 Mercato Nova - Passion Voile & Nautisme</p>
    </footer>

</body>
</html>
